<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example Post - Your Name</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/include.js"></script>
</head>
<body>
    <div data-include="/header.html"></div>

    <main class="main-content">
        <article class="content-article">
            <p class="article-date">2025-01-15</p>
            <h1>Example Post Title</h1>

            <p>
                Start writing your content here. This is the first paragraph.
            </p>

            <h2>Section heading</h2>

            <p>
                More content. You can use <strong>bold</strong>,
                <em>italic</em>, images, code snippets, equations via
                MathJax, etc.
            </p>

            <h2>Another section</h2>

            <p>
                Images can be inserted like this:
            </p>

            <figure>
                <img src="/profile.jpg" alt="figure"
                     style="width:400px;">
            </figure>

            <p>
                Links work as usual: <a href="https://example.com">example link</a>.
            </p>
        </article>
    </main>

    <div data-include="/footer.html"></div>
</body>
</html>
